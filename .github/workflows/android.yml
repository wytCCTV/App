name: Android CI

on:
  push:
    branches: [ "main" ] # 当代码推送到 main 分支时触发
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # 使用 GitHub 提供的 Linux 云环境

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 配置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: 授予 Gradle 执行权限
      run: chmod +x gradlew

    - name: 执行编译 (Build with Gradle)
      run: ./gradlew assembleDebug

    - name: 上传编译产物 (APK)
    # 这一步会将生成的 APK 保存，方便您下载
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/*.apk
